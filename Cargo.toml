[package]
name = "gnss-time"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Type-safe GNSS time scales: GPS, GLONASS, Galileo, BeiDou, TAI, UTC"
license = "MIT OR Apache-2.0"
keywords = ["gnss", "gps", "time", "no-std", "embedded"]
categories = ["no-std", "science", "date-and-time"]

[features]
default = []
std = []

[dependencies]

[dev-dependencies]
criterion = "0.8.2"

[[bench]]
name = "time_bench"
path = "benches/time_bench.rs"
harness = false
