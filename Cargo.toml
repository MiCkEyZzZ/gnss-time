[package]
name = "gnss-time"
version = "0.1.0"
edition = "2021"
description = "Type-safe GNSS time scales: GLONASS, GPS, Galileo, BeiDou, TAI, UTC"
license = "MIT OR Apache-2.0"
repository = "https://github.com/MiCkEyZzZ/gnss-time"
keywords = ["gnss", "glonass", "gps", "time", "no-std", "embedded"]
categories = ["no-std", "science", "date-and-time"]
authors = ["<zedmfix@gmail.com>"]

# Minimum supported Rust version
rust-version = "1.75"

[features]
default = []
std = []

[dependencies]

[dev-dependencies]
criterion = "0.8.2"

[[bench]]
name = "time_bench"
path = "benches/time_bench.rs"
harness = false

[[example]]
name = "basic_usage"
path = "examples/basic_usage.rs"

[[example]]
name = "gps_week_tow"
path = "examples/gps_week_tow.rs"

[[example]]
name = "glonass_day_tod"
path = "examples/glonass_day_tod.rs"

[[example]]
name = "scale_conversion"
path = "examples/scale_conversion.rs"

[[example]]
name = "display_formats"
path = "examples/display_formats.rs"

[[example]]
name = "convert_basic"
path = "examples/convert_basic.rs"

[[example]]
name = "convert_contextual"
path = "examples/convert_contextual.rs"

[[example]]
name = "matrix_inspection"
path = "examples/matrix_inspection.rs"
