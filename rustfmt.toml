# rustfmt.toml — formatting configuration for the Gorka project.
# Note: some options (format_macro_bodies, format_macro_matchers, unstable_features)
# require nightly rustfmt.

edition = "2021" # Rust edition.
max_width = 100  # Preferred maximum line width.

hard_tabs = false                  # false => use spaces (typically 4 spaces).
comment_width = 80                 # Wrap comments at this width.
wrap_comments = true               # Automatically wrap long comments.
format_code_in_doc_comments = true # Format code inside doc comments.

# Macros — formatting macro bodies and matchers (requires nightly rustfmt)
format_macro_bodies = true
format_macro_matchers = true

# Comment and doc attribute normalization
normalize_comments = true
normalize_doc_attributes = true

# Condense wildcard suffixes in imports (legacy / simplification)
condense_wildcard_suffixes = true

newline_style = "Unix" # Use LF line endings.

# Convenience shorthands
use_field_init_shorthand = true # x instead of x: x in struct initialization
use_try_shorthand = true        # prefer ? / try shorthand

# Enable experimental rustfmt features (requires nightly)
unstable_features = true

# Trailing comma style for multi-line lists (git-friendly)
trailing_comma = "Vertical"

# Import grouping configuration
imports_granularity = "Crate"      # Group within crate::..., "Preserve" leaves as-is
imports_layout = "Mixed"           # Layout style of grouped imports
group_imports = "StdExternalCrate" # std first, then external crates, then local

# Brace placement style
brace_style = "SameLineWhere"          # Opening brace placement for where/impl
control_brace_style = "AlwaysSameLine" # Opening brace for if/for/while

# Function parameter layout: each parameter on a new line (very vertical style)
fn_params_layout = "Vertical"
