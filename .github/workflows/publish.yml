# Publishing to crates.io.
#
# WHEN if runs:
#   Only when a tag v*.*.* created (push tag).
#   The tah is created manually after merging into master:
#
#     git tag v0.3.1
#     git push origin v0.3.1
#
# WHAT it does:
#   1. Waits for the match main CI (ci.yml) on the same cpmmite.
#   2. Verifies that the version in Cargo.toml matches the tag.
#   3. cargo publish --dry-run (smoke test before actual publishing).
#   4. cargo publish (actual publish using CARGO_REGISTRY_TOKEN).
#
# SECRET:
#   CARGO_REGISTRY_TOKEN — crates.io API token.
#   Add: GitHub → Settings → Secrets → Actions → New repository secret.

name: Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # only semantic tags: v0.3.0, v1.0.0, etc.

env:
  CARGO_TERM_COLOR: always

jobs:
  wait-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow to succeed
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "CI" # workflow name from ci.yml (name: CI)
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20 # poll ebery 20 seconds

  check-version:
    name: Check version matches tag
    runs-on: ubuntu-latest
    needs: wait-ci
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract version from Cargo.toml
        id: cargo
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Assert tag == Cargo.toml version
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          CARGO="${{ steps.cargo.outputs.version }}"
          echo "Tag version:   $TAG"
          echo "Cargo version: $CARGO"
          if [ "$TAG" != "$CARGO" ]; then
            echo "ERROR: Tag v$TAG does not match Cargo.toml version $CARGO"
            echo "Update [package] version in Cargo.toml before tagging."
            exit 1
          fi
          echo "Version OK: $TAG"

  dry-run:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-14

      - name: cargo publish --dry-run
        run: cargo publish --dry-run --allow-dirty

  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    needs: dry-run
    environment: crates-io # GitHub Environment with protection (requires review)
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-14

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.
