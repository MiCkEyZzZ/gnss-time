# Publishing to crates.io.
#
# Triggers only on semantic tags v*.*.*.
# The tag is created manually after merging into master:
#
#   git tag v0.4.0
#   git push origin v0.4.0
#
# What it does:
#   1. Verifies that Cargo.toml version matches the tag.
#   2. Runs cargo publish --dry-run.
#   3. Runs cargo publish using CARGO_REGISTRY_TOKEN.
#   4. Creates a GitHub Release.

name: Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  check-version:
    name: Check version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract version from Cargo.toml
        id: cargo
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Assert tag == Cargo.toml version
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          CARGO="${{ steps.cargo.outputs.version }}"
          echo "Tag version:   $TAG"
          echo "Cargo version: $CARGO"
          if [ "$TAG" != "$CARGO" ]; then
            echo "ERROR: Tag v$TAG does not match Cargo.toml version $CARGO"
            echo "Update [package] version in Cargo.toml before tagging."
            exit 1
          fi
          echo "Version OK: $TAG"

  dry-run:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    needs: check-version
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-14

      - name: cargo publish --dry-run
        run: cargo publish --dry-run --allow-dirty

  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    needs: dry-run
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-14

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.
