# ci.yml
#
# Основной CI пайплайн: качество кода, тесты, документация, MSRV, аудит.
# Запускается при каждом push и PR.
#
# Jobs:
#   fmt      — форматирование (cargo fmt + taplo)
#   clippy   — статический анализ, все feature-комбинации
#   test     — cargo test (default, std, defmt, std+defmt)
#   docs     — cargo doc без предупреждений
#   deny     — аудит лицензий и CVE (cargo deny)
#   msrv     — проверка MSRV = Rust 1.75
#   embedded — вызывает embedded.yml как reusable workflow

name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Форматирование ────────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-14
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: Setup taplo
        uses: uncenter/setup-taplo@v1
        with:
          version: "0.9.3"

      - name: taplo fmt --check (TOML файлы)
        run: taplo fmt --check

  # ── Clippy ────────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-14
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}

      - name: clippy — default features
        run: cargo clippy --all-targets -- -D warnings

      - name: clippy — std feature
        run: cargo clippy --all-targets --features std -- -D warnings

      - name: clippy — defmt feature
        run: cargo clippy --all-targets --features defmt -- -D warnings

      - name: clippy — all features
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Verify #![forbid(unsafe_code)]
        run: grep -n "forbid(unsafe_code)" src/lib.rs

      - name: Verify #![deny(missing_docs)]
        run: grep -n "deny(missing_docs)" src/lib.rs

  # ── Тесты ─────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.features || 'default' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "" # default (no_std)
          - "std"
          - "defmt"
          - "std,defmt"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-14

      - name: Normalize features для cache key
        id: norm
        run: |
          KEY="${{ matrix.features }}"
          echo "key=${KEY//,/-}" >> $GITHUB_OUTPUT

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ steps.norm.outputs.key }}-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo test
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -z "$FEATURES" ]; then
            cargo test
          else
            cargo test --features "$FEATURES"
          fi

  # ── Документация ──────────────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-14

      - name: cargo doc — all features, -D warnings
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

  # ── Аудит лицензий и уязвимостей ─────────────────────────────────────────────
  deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check
          arguments: --all-features

  # ── MSRV: минимальная поддерживаемая версия Rust (1.75) ─────────────────────
  msrv:
    name: MSRV 1.75
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.75
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.75"

      - name: cargo check — no features
        run: cargo check --lib --no-default-features

      - name: cargo check — std feature
        run: cargo check --lib --features std

      - name: cargo check — defmt feature
        run: cargo check --lib --no-default-features --features defmt

  # ── Embedded (reusable) ───────────────────────────────────────────────────────
  # Вызывает embedded.yml как reusable workflow.
  # Не дублирует логику — embedded.yml остаётся единым источником правды.
  embedded:
    name: Embedded
    needs: [fmt, clippy] # запускать только если базовые проверки прошли
    uses: ./.github/workflows/embedded.yml
