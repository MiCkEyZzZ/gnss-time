# embedded.yml
#
# Проверка no_std совместимости и кросс-компиляция под embedded targets.
#
# Targets:
#   thumbv7em-none-eabihf          — STM32F4/F7, nRF52 (Cortex-M4F/M7F с FPU)
#   thumbv7em-none-eabi            — Cortex-M4/M7 без FPU
#   riscv32imac-unknown-none-elf   — ESP32-C3, GD32VF103
#
# Запускается:
#   - автономно при push/PR в master/develop и на тегах v*.*.*
#   - как reusable workflow — вызывается из ci.yml через workflow_call

name: embedded no_std

on:
  push:
    branches: [master, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [master]
  workflow_dispatch:
  workflow_call: # reusable: ci.yml вызывает этот workflow

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Кросс-компиляция ──────────────────────────────────────────────────────────
  cross-compile:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - thumbv7em-none-eabihf
          - thumbv7em-none-eabi
          - riscv32imac-unknown-none-elf
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-14
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-embedded-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check — no features
        run: >
          cargo check --lib
          --no-default-features
          --target ${{ matrix.target }}

      - name: cargo check — defmt feature
        run: >
          cargo check --lib
          --no-default-features --features defmt
          --target ${{ matrix.target }}

  # ── Проверка размеров типов (Time<S> = 8 байт) ───────────────────────────────
  type-sizes:
    name: Type sizes = 8 bytes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-14

      - name: Verify Time<S> is exactly 8 bytes
        run: >
          cargo test --lib
          time::tests::test_size_equals_u64
          -- --nocapture
