# Cross-compilation and embedded build configuration for gnss-time.
#
# Goals:
# - deterministic CI behavior
# - strict warning policy
# - optimized no_std builds
# - portable embedded validation
#
# Notes:
# - This crate is a library, so we intentionally avoid:
# * custom runners
# * linker scripts
# * target-specific linkers
# - Consumers may override these settings in downstream projects.

[build]
# Default host target.
# CI overrides this via CARGO_BUILD_TARGET or --target.

# ============================================================================
# ARM Cortex-M
# ============================================================================

# Cortex-M4F / Cortex-M7F with hardware floating point
# Examples:
# - STM32F4
# - STM32F7
# - nRF52840
[target.thumbv7em-none-eabihf]
rustflags = [
    "-C", "opt-level=s",
    "-C", "codegen-units=1",
    "-C", "link-arg=-Tlink.x",    # linker script from cortex-m-rt (if used)
    "-D", "warnings",
]

# Cortex-M4 / M7 without FPU (STM32F3xx)
[target.thumbv7em-none-eabi]
rustflags = [
    "-C", "opt-level=s",
    "-C", "codegen-units=1",
    "-D", "warnings",
]

# Cortex-M0 / M0+ (STM32F0xx, nRF51)
[target.thumbv6m-none-eabi]
rustflags = [
    "-C", "opt-level=s",
    "-C", "codegen-units=1",
    "-D", "warnings",
]

# ============================================================================
# RISC-V
# ============================================================================

# RV32IMAC
# Examples:
# - ESP32-C3
# - GD32VF103
# - CH32V
[target.riscv32imac-unknown-none-elf]
rustflags = [
    "-C", "opt-level=s",
    "-C", "codegen-units=1",
    "-D", "warnings",
]

# RV32I (no atomics)
# Examples:
# - ESP32-C2
[target.riscv32i-unknown-none-elf]
rustflags = [
    "-C", "opt-level=s",
    "-D", "warnings",
]
