# Cross-compilation configuration for embedded targets.
#
# Local builds for a specific target:
#   cargo build --target thumbv7em-none-eabihf
#   cargo build --target riscv32imac-unknown-none-elf
#
# No-std verification:
#   cargo check --target thumbv7em-none-eabihf
#
# One-time target installation:
#   rustup target add thumbv7em-none-eabihf
#   rustup target add thumbv7em-none-eabi
#   rustup target add riscv32imac-unknown-none-elf

[build]
# Default host target.
# CI overrides this via CARGO_BUILD_TARGET or --target.

# Cortex-M4F / M7F with FPU (STM32F4xx, STM32F7xx, nRF52840)
[target.thumbv7em-none-eabihf]
# opt-level=s — minimize binary size (important for flash constraints)
# codegen-units=1 — better optimization via single codegen unit
rustflags = [
    "-C", "opt-level=s",
    "-C", "codegen-units=1",
    "-C", "link-arg=-Tlink.x",    # linker script from cortex-m-rt (if used)
    "-D", "warnings",
]

# Cortex-M4 / M7 without FPU (STM32F3xx)
[target.thumbv7em-none-eabi]
rustflags = [
    "-C", "opt-level=s",
    "-C", "codegen-units=1",
    "-D", "warnings",
]

# Cortex-M0 / M0+ (STM32F0xx, nRF51)
[target.thumbv6m-none-eabi]
rustflags = [
    "-C", "opt-level=s",
    "-C", "codegen-units=1",
    "-D", "warnings",
]

# 32-bit RISC-V (ESP32-C3, GD32VF103, CH32V)
[target.riscv32imac-unknown-none-elf]
rustflags = [
    "-C", "opt-level=s",
    "-C", "codegen-units=1",
    "-D", "warnings",
]

# 32-bit RISC-V without atomic support (ESP32-C2)
[target.riscv32i-unknown-none-elf]
rustflags = [
    "-C", "opt-level=s",
    "-D", "warnings",
]
