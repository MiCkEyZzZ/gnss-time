# Конфигурация кросс-компиляции для embedded targets.
#
# Локальная сборка под конкретный таргет:
#   cargo build --target thumbv7em-none-eabihf
#   cargo build --target riscv32imac-unknown-none-elf
#
# Проверка без std:
#   cargo check --target thumbv7em-none-eabihf
#
# Установка таргетов (однократно):
#   rustup target add thumbv7em-none-eabihf
#   rustup target add thumbv7em-none-eabi
#   rustup target add riscv32imac-unknown-none-elf

[build]
# Хостовый таргет по умолчанию.
# CI переопределяет через CARGO_BUILD_TARGET или --target.

# ── Cortex-M4F / M7F с FPU (STM32F4xx, STM32F7xx, nRF52840) ─────────────────
[target.thumbv7em-none-eabihf]
# opt-level=s — минимальный размер бинарника (важно для flash-ограничений)
# codegen-units=1 — лучшая оптимизация через единый кодогенератор
rustflags = [
    "-C", "opt-level=s",
    "-C", "codegen-units=1",
    "-C", "link-arg=-Tlink.x",   # linker script от cortex-m-rt (если используется)
    "-D", "warnings",
]

# ── Cortex-M4 / M7 без FPU (STM32F3xx) ───────────────────────────────────────
[target.thumbv7em-none-eabi]
rustflags = [
    "-C", "opt-level=s",
    "-C", "codegen-units=1",
    "-D", "warnings",
]

# ── Cortex-M0 / M0+ (STM32F0xx, nRF51) ───────────────────────────────────────
[target.thumbv6m-none-eabi]
rustflags = [
    "-C", "opt-level=s",
    "-C", "codegen-units=1",
    "-D", "warnings",
]

# ── RISC-V 32-bit (ESP32-C3, GD32VF103, CH32V) ───────────────────────────────
[target.riscv32imac-unknown-none-elf]
rustflags = [
    "-C", "opt-level=s",
    "-C", "codegen-units=1",
    "-D", "warnings",
]

# ── RISC-V 32-bit без atomic (ESP32-C2) ───────────────────────────────────────
[target.riscv32i-unknown-none-elf]
rustflags = [
    "-C", "opt-level=s",
    "-D", "warnings",
]
