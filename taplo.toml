## Taplo configuration for formatting TOML files in the Gorka project
## Purpose: enforce a consistent style across all Cargo.toml files in the workspace
## Usage: taplo fmt — to format files
## Documentation: https://taplo.tamasfe.dev/configuration/file.html

# Which files to include for formatting.
# We format all Cargo.toml files across the entire workspace.
include = ["**/Cargo.toml"]

[formatting]
# Maximum line width (beyond which Taplo may wrap elements).
column_width = 100
# Allow arrays to expand automatically when needed.
array_auto_expand = true
# Do not collapse arrays into a single line (false = keep expanded for readability).
array_auto_collapse = false
# Use compact array formatting (removes unnecessary whitespace).
compact_arrays = true
# Do not compact inline tables into a single line (keep them readable).
compact_inline_tables = false
# Add trailing comma after last array element.
array_trailing_comma = true
# Indentation style — 4 spaces.
indent_string = "    "
# Ensure newline at end of file.
trailing_newline = true
# Align comments to a fixed column.
align_comments = true
# Do not align key-value entries (preserve natural structure).
align_entries = false
# Do not compact multiple key-value pairs into a single line.
compact_entries = false
# Expand inline tables (e.g. { key = "value" }) into multi-line form when needed.
inline_table_expand = true
# Use Unix line endings (LF) instead of CRLF.
crlf = false

# Do not reorder keys globally.
reorder_keys = false
# Do not reorder array elements.
reorder_arrays = false
# Do not reorder inline tables.
reorder_inline_tables = false

[[rule]]
# For dependency sections — sort keys alphabetically.
# Keeps Cargo.toml clean and consistent.
keys = [
  "build-dependencies",
  "dependencies",
  "dev-dependencies",
  "workspace.dependencies",
]
formatting = { reorder_keys = true }

[[rule]]
# For package metadata sections — preserve key order.
# Important because logical ordering is usually intentional:
# name → version → edition → authors → license → description, etc.
keys = ["package", "workspace.package"]
formatting = { reorder_keys = false }

# Files and directories excluded from formatting.
# Paths are relative to the workspace root.
exclude = [
  "target/**",
  "docs/**",
  "fuzz/**",
  "node_modules/**",
  "**/Cargo.lock",
  ".venv/**",
  ".git/**",
]
